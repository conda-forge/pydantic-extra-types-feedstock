schema_version: 1

context:
  name: pydantic-extra-types
  version: "2.11.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pydantic_extra_types-${{ version }}.tar.gz
  sha256: 46792d2307383859e923d8fcefa82108b1a141f8a9c0198982b3832ab5ef1049

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pydantic >=2.5.2
  run_constraints:
    - phonenumbers >=8,<9
    - pycountry >=23
    - semver >=3.0.2,<4
    - python-ulid >=1,<4
    - pendulum >=3.0.0,<4.0.0
    - pytz >=2024.1
    - tzdata >=2024a

tests:
  - python:
      imports:
        - pydantic_extra_types
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - 3.*

about:
  license: MIT
  license_file: LICENSE
  summary: A place for pydantic types that probably shouldn't exist in the main pydantic lib.
  homepage: https://github.com/pydantic/pydantic-extra-types
  repository: https://github.com/pydantic/pydantic-extra-types
  documentation: https://docs.pydantic.dev/

extra:
  recipe-maintainers:
    - ytausch
